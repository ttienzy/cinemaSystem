# Cinema System - Docker Compose
# Services: API, SQL Server, Redis, Mailhog

services:
  # ============================================
  # ASP.NET Core API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cinema_api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__BookingConnection=Server=sqlserver;Database=Booking;User=sa;Password=ComplexPassword123!;TrustServerCertificate=True
      - ConnectionStrings__IdentityConnection=Server=sqlserver;Database=Identity;User=sa;Password=ComplexPassword123!;TrustServerCertificate=True
      - ConnectionStrings__RedisConnection=redis:6379
      - Jwt__SecretKey=fjwhi493rkj3brkj3?><ewjo3u093rhnf899r32b8r3hjkh#%#$%
      - Jwt__Issuer=BookingApi
      - Jwt__Audience=BookingApiUsers
      - Jwt__AccessTokenExpiration=20
      - Jwt__RefreshTokenExpiration=7
      - Vnpay__vnp_TmnCode=RCQ192AT
      - Vnpay__HashSecret=CR3CTXV9101ATEGO7GFGWO80JTXD2AZ3
      - Vnpay__BaseUrl=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
      - PaymentCallBack__vnp_ReturnUrl=http://localhost:8080/api/Bookings/callback
      - TimeZone__Id=SE Asia Standard Time
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # SQL Server
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinema_sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=ComplexPassword123!
      - MSSQL_PID=Developer
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "ComplexPassword123!" -Q "SELECT 1" -C || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: cinema_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================
  # Mailhog (Development Email Testing)
  # ============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cinema_mailhog
    ports:
      - "1025:1025"  # SMTP
      - "8025:8025"  # Web UI
    environment:
      - MH_UI_WEB_PATH=mailhog
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/mailhog"]
      interval: 30s
      timeout: 10s
      retries: 3

# ============================================
# Networks
# ============================================
networks:
  cinema_network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  sqlserver_data:
  redis_data:
