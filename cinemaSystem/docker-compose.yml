# ============================================
# Cinema Booking System - Docker Compose
# ============================================
# Services:
#   - api: ASP.NET Core 8.0 Backend API
#   - frontend: React + Vite Frontend
#   - sqlserver: SQL Server 2022 Database
#   - redis: Redis Cache & Session Store
#   - mailhog: Email Testing Tool (Development)
#   - nginx: Reverse Proxy (Production-ready)
# ============================================

version: '3.8'

services:
  # ============================================
  # ASP.NET Core Backend API
  # ============================================
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - ASPNETCORE_ENVIRONMENT=Docker
    container_name: cinema_api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      # ASP.NET Core Configuration
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - ASPNETCORE_HTTP_PORTS=8080
      
      # Database Connection Strings
      - ConnectionStrings__BookingConnection=Server=sqlserver;Database=Booking;User=sa;Password=${SA_PASSWORD:-ComplexPassword123!};TrustServerCertificate=True;MultipleActiveResultSets=True;
      - ConnectionStrings__IdentityConnection=Server=sqlserver;Database=Identity;User=sa;Password=${SA_PASSWORD:-ComplexPassword123!};TrustServerCertificate=True;MultipleActiveResultSets=True;
      - ConnectionStrings__RedisConnection=redis:6379
      
      # JWT Configuration
      - Jwt__SecretKey=${JWT_SECRETKEY:-fjwhi493rkj3brkj3?><ewjo3u093rhnf899r32b8r3hjkh#%#$%}
      - Jwt__Issuer=${JWT_ISSUER:-BookingApi}
      - Jwt__Audience=${JWT_AUDIENCE:-BookingApiUsers}
      - Jwt__AccessTokenExpiration=${JWT_ACCESSTOKENEXPIRATION:-20}
      - Jwt__RefreshTokenExpiration=${JWT_REFRESHTOKENEXPIRATION:-7}
      - Jwt__ValidateIssuer=true
      - Jwt__ValidateAudience=true
      - Jwt__ValidateIssuerSigningKey=true
      
      # VnPay Payment Gateway
      - Vnpay__vnp_TmnCode=${VNPAY_TMNCODE:-RCQ192AT}
      - Vnpay__HashSecret=${VNPAY_HASHSECRET:-CR3CTXV9101ATEGO7GFGWO80JTXD2AZ3}
      - Vnpay__BaseUrl=${VNPAY_BASEURL:-https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
      - Vnpay__vnp_Command=pay
      - Vnpay__vnp_CurrCode=VND
      - Vnpay__vnp_Version=2.1.0
      - Vnpay__vnp_Locale=vn
      
      # Payment Callback URL
      - PaymentCallBack__vnp_ReturnUrl=http://localhost:3000/booking/callback
      
      # SMTP Configuration (Mailhog for development)
      - Smtp__Server=${SMTP_SERVER:-mailhog}
      - Smtp__Port=${SMTP_PORT:-1025}
      - Smtp__SenderName=${SMTP_SENDERNAME:-CinemaSystem}
      - Smtp__SenderEmail=${SMTP_SENDEREMAIL:-noreply@cinema.local}
      - Smtp__Username=${SMTP_USERNAME:-}
      - Smtp__Password=${SMTP_PASSWORD:-}
      
      # Timezone Configuration
      - TimeZone__Id=SE Asia Standard Time
      - TZ=Asia/Ho_Chi_Minh
      
      # Identity Seed Data
      - Identity__DefaultAdminEmail=${IDENTITY_DEFAULT_ADMIN_EMAIL:-admin@cinema.com}
      - Identity__DefaultAdminPassword=${IDENTITY_DEFAULT_ADMIN_PASSWORD:-Admin@Cinema2024!}
      
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/swagger/index.html"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    volumes:
      # Mount logs directory for debugging
      - ./logs/api:/app/logs
    labels:
      - "com.cinema.service=api"
      - "com.cinema.description=Backend API Service"

  # ============================================
  # React Frontend (Vite)
  # ============================================
  frontend:
    build:
      context: ./Web/cinema-ui
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: cinema_frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
      - VITE_API_URL=http://localhost:8080
    depends_on:
      - api
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "com.cinema.service=frontend"
      - "com.cinema.description=React Frontend Service"

  # ============================================
  # SQL Server 2022 Database
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: cinema_sqlserver
    hostname: sqlserver
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=${SA_PASSWORD:-ComplexPassword123!}
      - MSSQL_PID=Developer
      - MSSQL_COLLATION=SQL_Latin1_General_CP1_CI_AS
      - MSSQL_MEMORY_LIMIT_MB=2048
      - MSSQL_TCP_PORT=1433
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - sqlserver_log:/var/opt/mssql/log
      - sqlserver_backup:/var/opt/mssql/backup
      # Optional: Mount init scripts
      # - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SA_PASSWORD:-ComplexPassword123!}" -Q "SELECT 1" -C || exit 1
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    labels:
      - "com.cinema.service=database"
      - "com.cinema.description=SQL Server Database"

  # ============================================
  # Redis Cache & Session Store
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: cinema_redis
    hostname: redis
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - redis_config:/usr/local/etc/redis
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    labels:
      - "com.cinema.service=cache"
      - "com.cinema.description=Redis Cache Service"

  # ============================================
  # Mailhog - Email Testing (Development)
  # ============================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: cinema_mailhog
    hostname: mailhog
    ports:
      - "1025:1025"  # SMTP Server
      - "8025:8025"  # Web UI
    environment:
      - MH_STORAGE=maildir
      - MH_MAILDIR_PATH=/maildir
      - MH_UI_WEB_PATH=mailhog
      - MH_HOSTNAME=mailhog
    volumes:
      - mailhog_data:/maildir
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    labels:
      - "com.cinema.service=mail"
      - "com.cinema.description=Email Testing Service"

  # ============================================
  # Nginx Reverse Proxy (Optional - Production)
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: cinema_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
      - nginx_logs:/var/log/nginx
    depends_on:
      - api
      - frontend
    networks:
      - cinema_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    labels:
      - "com.cinema.service=proxy"
      - "com.cinema.description=Nginx Reverse Proxy"
    profiles:
      - production

  # ============================================
  # Redis Commander - Redis Management UI (Optional)
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cinema_redis_commander
    hostname: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379
      - HTTP_USER=admin
      - HTTP_PASSWORD=admin
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - cinema_network
    restart: unless-stopped
    labels:
      - "com.cinema.service=redis-ui"
      - "com.cinema.description=Redis Management UI"
    profiles:
      - tools

# ============================================
# Networks
# ============================================
networks:
  cinema_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      - "com.cinema.network=main"

# ============================================
# Volumes
# ============================================
volumes:
  # SQL Server Volumes
  sqlserver_data:
    driver: local
    labels:
      - "com.cinema.volume=sqlserver-data"
  sqlserver_log:
    driver: local
    labels:
      - "com.cinema.volume=sqlserver-log"
  sqlserver_backup:
    driver: local
    labels:
      - "com.cinema.volume=sqlserver-backup"
  
  # Redis Volumes
  redis_data:
    driver: local
    labels:
      - "com.cinema.volume=redis-data"
  redis_config:
    driver: local
    labels:
      - "com.cinema.volume=redis-config"
  
  # Mailhog Volume
  mailhog_data:
    driver: local
    labels:
      - "com.cinema.volume=mailhog-data"
  
  # Nginx Volumes
  nginx_cache:
    driver: local
    labels:
      - "com.cinema.volume=nginx-cache"
  nginx_logs:
    driver: local
    labels:
      - "com.cinema.volume=nginx-logs"
